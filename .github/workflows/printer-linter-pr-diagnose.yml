name: printer-linter-pr-diagnose

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Target branch to run the workflow on'
        required: false
        default: 'main'
      printer:
        description: 'Printer name to lint all related files (e.g. ultimaker_s5). Runs instead of the PR diff when set.'
        required: false
        default: ''
  pull_request:
    paths:
      - "resources/**"

permissions:
  contents: read

jobs:
  printer-linter-diagnose:
    name: Printer linter PR diagnose

    runs-on: ubuntu-latest
    steps:
      - name: Setup the build environment
        uses: ultimaker/cura-workflows/.github/actions/setup-build-environment@main
        with:
          branch: ${{ github.event.inputs.branch || 'main' }}
      - uses: greguintow/get-diff-action@v7
        with:
          DIFF_FILTER: AMRCD
          PATTERNS: |
            resources/+(extruders|definitions)/*.def.json
            resources/+(intent|quality|variants)/**/*.inst.cfg

      - name: Create results directory
        run: mkdir printer-linter-result

      - name: Collect printer files specified by input (UM only, optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.printer != '' }}
        env:
          PRINTER_INPUT: ${{ github.event.inputs.printer }}
        run: |
          if ! [[ "$PRINTER_INPUT" =~ ^[a-zA-Z0-9_]+$ ]]; then
            echo "::error::Invalid printer name '${PRINTER_INPUT}'. Only letters, digits, and underscores are allowed."
            exit 1
          fi
          FILES=$(find resources \( \
            -path "resources/definitions/${PRINTER_INPUT}.def.json" \
            -o -path "resources/extruders/${PRINTER_INPUT}_*.def.json" \
            -o -path "resources/quality/${PRINTER_INPUT}/*.inst.cfg" \
            -o -path "resources/variants/${PRINTER_INPUT}*.inst.cfg" \
            -o -path "resources/intent/${PRINTER_INPUT}/*.inst.cfg" \
          \) -type f | tr '\n' ' ')
          if [ -z "${FILES// }" ]; then
            echo "::error::No resource files found for printer '${PRINTER_INPUT}'. Verify the printer name is correct."
            exit 1
          fi
          echo "PRINTER_FILES=$FILES" >> "$GITHUB_ENV"

      - name: Diagnose printer file(s) specified by input (UM only, optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.printer != '' }}
        run: python printer-linter/src/terminal.py --diagnose --report printer-linter-result/fixes.yml $PRINTER_FILES

      - name: Diagnose file(s)
        if: env.GIT_DIFF && !env.MATCHED_FILES
        run: python printer-linter/src/terminal.py --diagnose --report printer-linter-result/fixes.yml ${{ env.GIT_DIFF_FILTERED }}

      - name: Check Deleted Files(s)
        if: env.GIT_DIFF
        run: python printer-linter/src/terminal.py --deleted --report printer-linter-result/comment.md ${{ env.GIT_DIFF_FILTERED }}

      - name: Save PR metadata
        run: |
          echo ${{ github.event.number }} > printer-linter-result/pr-id.txt
          echo ${{ github.event.pull_request.head.repo.full_name }} > printer-linter-result/pr-head-repo.txt
          echo ${{ github.event.pull_request.head.sha }} > printer-linter-result/pr-head-sha.txt

      - uses: actions/upload-artifact@v7
        with:
          name: printer-linter-result
          path: printer-linter-result/
